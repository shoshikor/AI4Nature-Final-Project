name: Traffic Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

# Added permissions to allow the action to push changes
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Updated to match the filename in main.py
          FILE_NAME="historical_traffic_tel_aviv.csv"
          
          if [ -f "$FILE_NAME" ]; then
            git add "$FILE_NAME"
            # The '|| true' prevents the workflow from failing if there are no new changes
            git commit -m "Update traffic data: $(date)" || echo "No changes to commit"
            git push
          else
            echo "File $FILE_NAME was not found. Check your Python script output."
            exit 1
          fi
